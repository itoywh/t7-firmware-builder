name: Build ImmortalWrt for 360 T7

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Setup build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            python3 libelf-dev ecj fastjar ccache
          # Enable ccache symlinks so make picks up ccache automatically
          sudo /usr/sbin/update-ccache-symlinks 2>/dev/null || true
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          ccache --max-size=2G
          ccache -z

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Clone ImmortalWrt source
        run: |
          git clone https://github.com/padavanonly/immortalwrt-mt798x-6.6.git \
            -b openwrt-24.10-6.6 --depth 1 openwrt
          echo "REPO_SHA=$(cd openwrt && git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-t7-${{ hashFiles('feeds.conf.default') }}-${{ github.run_number }}
          restore-keys: |
            ccache-t7-${{ hashFiles('feeds.conf.default') }}-
            ccache-t7-

      - name: Restore dl cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: dl-t7-${{ hashFiles('feeds.conf.default') }}

      - name: Apply custom feeds
        run: |
          cp feeds.conf.default openwrt/feeds.conf.default
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy preset files (opkg USTC mirror, etc.)
        run: |
          # Copy custom files into OpenWrt source tree
          # These override auto-generated configs in the final image
          if [ -d files ]; then
            cp -r files/* openwrt/files/
            echo "=== Copied files ==="
            find openwrt/files/ -type f
          fi

      - name: Generate .config from defconfig
        run: |
          cd openwrt
          # Start from MT7981 base config (multi-device)
          cat defconfig/mt7981-ax3000.config > .config
          # Switch to single device: 360 T7 108M
          sed -i 's/^CONFIG_TARGET_MULTI_PROFILE=y$/# CONFIG_TARGET_MULTI_PROFILE is not set/' .config
          sed -i 's/^CONFIG_TARGET_PER_DEVICE_ROOTFS=y$/# CONFIG_TARGET_PER_DEVICE_ROOTFS is not set/' .config
          # Enable only 360 T7 device
          echo "CONFIG_TARGET_mediatek_mt7981_DEVICE_mt7981-360-t7-108M=y" >> .config

      - name: Customize packages
        run: |
          cd openwrt
          # === Remove unwanted packages ===
          # eqos-mtk (MTK QoS, not needed)
          sed -i 's/^CONFIG_PACKAGE_luci-app-eqos-mtk=y$/# CONFIG_PACKAGE_luci-app-eqos-mtk is not set/' .config
          sed -i 's/^CONFIG_PACKAGE_luci-i18n-eqos-mtk-zh-cn=y$/# CONFIG_PACKAGE_luci-i18n-eqos-mtk-zh-cn is not set/' .config
          # wrtbwmon (bandwidth monitor, not needed)
          sed -i 's/^CONFIG_PACKAGE_luci-app-wrtbwmon=y$/# CONFIG_PACKAGE_luci-app-wrtbwmon is not set/' .config
          # bootstrap-mod theme (user uses default or argon)
          sed -i 's/^CONFIG_PACKAGE_luci-theme-bootstrap-mod=y$/# CONFIG_PACKAGE_luci-theme-bootstrap-mod is not set/' .config
          # zram-swap (512MB is enough)
          sed -i 's/^CONFIG_PACKAGE_zram-swap=y$/# CONFIG_PACKAGE_zram-swap is not set/' .config

          # === Add PassWall2 + sing-box core ===
          echo "CONFIG_PACKAGE_luci-app-passwall2=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-passwall2-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_sing-box=y" >> .config

          # === Add UPnP ===
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y" >> .config

          # === Enable ccache for faster subsequent builds ===
          echo "CONFIG_CCACHE=y" >> .config

          # === Keep confirmed packages (htop, tcpdump, BBR) ===
          # Already in defconfig, just verify
          grep -q "CONFIG_PACKAGE_htop=y" .config || echo "CONFIG_PACKAGE_htop=y" >> .config
          grep -q "CONFIG_PACKAGE_tcpdump=y" .config || echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          grep -q "CONFIG_PACKAGE_kmod-tcp-bbr=y" .config || echo "CONFIG_PACKAGE_kmod-tcp-bbr=y" >> .config

      - name: Resolve dependencies
        run: |
          cd openwrt
          make defconfig

      - name: Show final config diff
        run: |
          cd openwrt
          echo "=== Packages Diff (added/removed vs defconfig) ==="
          diff <(grep '^CONFIG_PACKAGE' defconfig/mt7981-ax3000.config | sort) \
               <(grep '^CONFIG_PACKAGE' .config | grep -v '^# ' | sort) || true
          echo "=== Target Device ==="
          grep 'CONFIG_TARGET_mediatek_mt7981_DEVICE' .config | grep -v '^# ' || true
          echo "=== Full Target Line ==="
          grep 'CONFIG_TARGET_mediatek_mt7981' .config | grep '=y' | grep -v '^# ' || grep 'CONFIG_TARGET_DEVICE' .config | grep -v '^# ' || true

      - name: Download all source packages
        run: |
          cd openwrt
          make download -j$(nproc) V=s

      - name: Compile firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s || make -j1 V=s

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-t7-${{ hashFiles('feeds.conf.default') }}-${{ github.run_number }}

      - name: Save dl cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: openwrt/dl
          key: dl-t7-${{ hashFiles('feeds.conf.default') }}

      - name: Collect output files
        run: |
          mkdir -p output
          TARGET_DIR="openwrt/bin/targets/mediatek/mt7981"
          echo "=== Build output ==="
          ls -lh "$TARGET_DIR/" 2>/dev/null || echo "No output in $TARGET_DIR"
          # Copy squashfs images
          cp "$TARGET_DIR"/*squashfs* output/ 2>/dev/null || true
          # Copy other useful files
          cp "$TARGET_DIR"/*.manifest output/ 2>/dev/null || true
          cp "$TARGET_DIR"/sha256sums output/ 2>/dev/null || true
          # Save the final config for reference
          cp openwrt/.config output/config-final.txt
          echo "=== Collected files ==="
          ls -lh output/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-T7-108M-${{ env.REPO_SHA }}
          path: output/
          retention-days: 30
